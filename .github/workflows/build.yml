name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and run gradlew
        run: |
          if [ -f "android_apk/gradlew" ]; then
            cd android_apk && chmod +x gradlew && bash gradlew assembleDebug --no-daemon
          elif [ -f "gradlew" ]; then
            chmod +x gradlew && bash gradlew assembleDebug --no-daemon
          else
            echo "ERREUR: gradlew introuvable!" && exit 1
          fi

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UPN-Presence-APK
          path: |
            android_apk/app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30
