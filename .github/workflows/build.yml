name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          if [ -f "android_apk/gradlew" ]; then
            cd android_apk && chmod +x gradlew && bash gradlew assembleDebug --no-daemon
          else
            chmod +x gradlew && bash gradlew assembleDebug --no-daemon
          fi

      - name: Copy APK to output folder
        run: |
          mkdir -p output
          find . -name "*.apk" -type f -exec cp {} output/UPN-Presence.apk \;
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UPN-Presence-APK
          path: output/UPN-Presence.apk
          retention-days: 30
