name: Build APK Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show structure
        run: |
          echo "=== ROOT ===" && ls -la
          echo "=== APP ===" && ls -la app/ 2>/dev/null || echo "no app folder"
          echo "=== GRADLE ===" && ls -la gradle/wrapper/ 2>/dev/null || echo "no gradle/wrapper"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: |
          ls -la gradlew 2>/dev/null || echo "gradlew not found"
          chmod +x gradlew 2>/dev/null || true
          git update-index --chmod=+x gradlew 2>/dev/null || true

      - name: Build APK
        run: bash gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UPN-Presence-APK
          path: "**/*.apk"
          retention-days: 30
